name: Codex Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      secrets.OPENAI_API_KEY != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Generate Codex review comment
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5-codex
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const marker = '<!-- codex-review-comment -->';

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const diffSummary = files
              .slice(0, 40)
              .map((file) => {
                const patch = file.patch ? file.patch.slice(0, 6000) : 'Patch omitted because the diff is too large or binary.';
                return [
                  `File: ${file.filename}`,
                  `Status: ${file.status}`,
                  `Additions: ${file.additions}`,
                  `Deletions: ${file.deletions}`,
                  'Patch:',
                  patch,
                ].join('\n');
              })
              .join('\n\n---\n\n');

            const prompt = [
              'You are Codex reviewing a GitHub pull request.',
              'Focus on bugs, regressions, security issues, missing tests, and risky behavior changes.',
              'Keep the response concise.',
              'If there are findings, return markdown bullets grouped under **Findings**.',
              'If there are no material findings, return exactly: No material issues found.',
              '',
              `Repository: ${owner}/${repo}`,
              `PR title: ${context.payload.pull_request.title}`,
              '',
              'Diff summary:',
              diffSummary || 'No textual diff available.',
            ].join('\n');

            const response = await fetch('https://api.openai.com/v1/responses', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${process.env.OPENAI_API_KEY}`,
              },
              body: JSON.stringify({
                model: process.env.OPENAI_MODEL,
                input: prompt,
              }),
            });

            if (!response.ok) {
              const errorText = await response.text();
              core.setFailed(`OpenAI API request failed: ${response.status} ${errorText}`);
              return;
            }

            const data = await response.json();
            const text = (data.output_text || '').trim() || 'No material issues found.';
            const body = `${marker}\n## Codex Review\n\n${text}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body,
              });
            }
